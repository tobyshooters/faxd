<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>faxd</title>
  <link rel="icon" href="/favicon.png" type="image/png">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <nav>
      <h1 id="logo">faxd</h1>
      <button class="tab" data-tab="settings">⚙️</button>
    </nav>
  </header>

  <main>
    <section id="home" class="page active">
      <form id="send-form">
        <label>To <input name="to" type="email" required></label>
        <label>File <input name="file" type="file" accept=".pdf,.jpg,.jpeg,.png" required></label>
        <img id="send-preview" hidden>
        <button type="submit">Send</button>
        <p id="send-status"></p>
      </form>

      <hr/>

      <table>
        <thead><tr><th>Sender</th><th>Time</th><th>File</th><th>Status</th></tr></thead>
        <tbody id="log-body"></tbody>
      </table>

      <hr/>

      <div class="card">
        <p>Daemon: <span id="d-running">--</span></p>
        <p>Last fax: <span id="d-last">--</span></p>
      </div>

      <pre id="debug-log"></pre>

    </section>

    <section id="settings" class="page">
      <form id="settings-form">
        <label>Email <input name="email" type="email" required></label>
        <label>Password <input name="password" type="password" placeholder="(unchanged if empty)"></label>
        <label>Poll interval (seconds) <input name="poll" type="number" min="5" value="30"></label>
        <label>Max attachment MB <input name="maxmb" type="number" min="1" value="20"></label>
        <label>Allowed extensions <input name="exts" type="text" placeholder=".pdf,.jpg,.png"></label>
        <label>Scaling % (0 = no scaling) <input name="scaling" type="number" min="0" max="100" value="50"></label>
        <label class="checkbox"><input name="monochrome" type="checkbox"> Monochrome</label>
        <button type="submit">Save</button>
      </form>

      <hr/>

      <h2>Allowed Senders</h2>
      <ul id="wl-list"></ul>
      <div class="row">
        <input id="wl-input" type="email" placeholder="sender@example.com">
        <button id="wl-add">Add</button>
      </div>
    </section>

  </main>

  <script src="/app.js"></script>
</body>
</html>
